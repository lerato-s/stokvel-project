<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Stokvel Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Create New Password</h1>
        <p>Please enter your new password below.</p>
        
        <form id="resetPasswordForm">
            <input type="hidden" id="token" name="token">
            <input type="hidden" id="email" name="email">
            
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="Enter new password">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6" placeholder="Confirm new password">
            </div>
            
            <button type="submit" id="resetBtn">Reset Password</button>
        </form>
        
        <div id="message" class="message"></div>
    </div>
    
    <script>
        // Get token and email from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');
        
        // Populate hidden fields
        const tokenInput = document.getElementById('token');
        const emailInput = document.getElementById('email');
        
        if (token && email) {
            tokenInput.value = token;
            emailInput.value = email;
        } else {
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message error';
            messageDiv.style.display = 'block';
            messageDiv.textContent = 'Invalid reset link. Please request a new password reset.';
            document.getElementById('resetBtn').disabled = true;
        }
        
        const form = document.getElementById('resetPasswordForm');
        const messageDiv = document.getElementById('message');
        const resetBtn = document.getElementById('resetBtn');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';
            
            if (password !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                messageDiv.textContent = 'Passwords do not match!';
                return;
            }
            
            /*if (password.length < 6) {
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                messageDiv.textContent = 'Password must be at least 6 characters';
                return;
            }*/
            
            resetBtn.disabled = true;
            resetBtn.textContent = 'Resetting...';
            
            try {
                const response = await fetch('http://localhost:3000/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: emailInput.value,
                        token: tokenInput.value,
                        newPassword: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                    messageDiv.textContent = 'Password reset successful! Redirecting to login...';
                    
                    setTimeout(() => {
                        window.location.href = 'http://localhost:5173/login';
                    }, 2000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                    messageDiv.textContent = data.error || 'Failed to reset password.';
                    resetBtn.disabled = false;
                    resetBtn.textContent = 'Reset Password';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                messageDiv.textContent = 'Network error. Please make sure the server is running.';
                resetBtn.disabled = false;
                resetBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
